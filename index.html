<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语100天冲刺 · NGSL打卡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f8f7ff;color:#1e293b;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:12px}

/* ---- 顶部状态栏 ---- */
.header{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.title{font-size:17px;font-weight:700;color:#7c3aed}
.streak{font-size:13px;color:#f59e0b;font-weight:600}
.progress-row{display:flex;gap:8px;align-items:center}
.progress-bar{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:4px;transition:width .4s}
.progress-text{font-size:12px;color:#64748b;min-width:70px;text-align:right}
.stats-row{display:flex;gap:10px;margin-top:8px}
.stat-item{flex:1;text-align:center;background:#f1f5f9;border-radius:10px;padding:6px 4px}
.stat-num{font-size:18px;font-weight:700;color:#7c3aed}
.stat-label{font-size:10px;color:#64748b;margin-top:1px}

/* ---- Tab导航 ---- */
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;transition:all .2s}
.tab.active{background:#7c3aed;color:#fff}

/* ---- 学习区 ---- */
.section{display:none}
.section.active{display:block}

/* 闪卡 */
.card-area{perspective:1000px;margin-bottom:16px}
.card{width:100%;min-height:200px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .4s}
.card.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card-front{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.card-back{background:#fff;transform:rotateY(180deg);border:2px solid #e2e8f0}
.card-word{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.card-hint{font-size:13px;opacity:.75}
.card-warn{font-size:12px;background:rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;margin-top:8px}
.card-def{font-size:16px;font-weight:600;color:#1e293b;text-align:center;line-height:1.5}
.card-zh{font-size:14px;color:#7c3aed;margin-top:6px;font-weight:500}
.card-ex{font-size:13px;color:#475569;margin-top:10px;text-align:center;line-height:1.6;font-style:italic}
.card-exzh{font-size:12px;color:#94a3b8;margin-top:4px;text-align:center}
.card-tag{font-size:11px;background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 8px;position:absolute;top:12px;right:12px}
.tap-hint{text-align:center;font-size:12px;color:#94a3b8;margin-bottom:10px}

/* 操作按钮 */
.btn-row{display:flex;gap:10px;margin-bottom:12px}
.btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-know{background:#dcfce7;color:#166534}
.btn-know:hover{background:#bbf7d0}
.btn-forget{background:#fee2e2;color:#991b1b}
.btn-forget:hover{background:#fecaca}
.btn-skip{background:#f1f5f9;color:#64748b;flex:0 0 auto;padding:12px 16px}

/* 进度提示 */
.session-info{text-align:center;font-size:12px;color:#94a3b8;margin-bottom:14px}

/* 今日完成 */
.done-card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.done-emoji{font-size:48px;margin-bottom:12px}
.done-title{font-size:22px;font-weight:700;color:#7c3aed;margin-bottom:6px}
.done-sub{font-size:14px;color:#64748b;margin-bottom:20px}
.done-stats{display:flex;justify-content:center;gap:24px}
.done-stat{text-align:center}
.done-stat-num{font-size:24px;font-weight:700;color:#7c3aed}
.done-stat-label{font-size:12px;color:#94a3b8}

/* 热力图 */
.heatmap-wrap{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.heatmap-title{font-size:14px;font-weight:600;color:#475569;margin-bottom:10px}
.heatmap{display:grid;grid-template-columns:repeat(17,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:3px;background:#f1f5f9}
.heatmap-cell.l1{background:#c4b5fd}
.heatmap-cell.l2{background:#a78bfa}
.heatmap-cell.l3{background:#7c3aed}
.heatmap-cell.l4{background:#5b21b6}
.heatmap-cell.today{outline:2px solid #f59e0b;outline-offset:1px}

/* 设置区 */
.settings-form{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.settings-form h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#7c3aed}
.form-row{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;display:block}
.form-hint{font-size:11px;color:#94a3b8;margin-top:3px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#7c3aed}
.seg{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:3px}
.seg-btn{flex:1;padding:7px 4px;border:none;border-radius:8px;font-size:13px;font-weight:600;color:#64748b;background:transparent;cursor:pointer;transition:all .2s}
.seg-btn.active{background:#fff;color:#7c3aed;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.btn-save{width:100%;padding:12px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-save:hover{background:#6d28d9}
.btn-save:active{transform:scale(.98)}
.btn-export{width:100%;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-export:hover{background:#e2e8f0}
.btn-reset{width:100%;padding:10px;background:#fee2e2;color:#991b1b;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.save-toast{text-align:center;color:#16a34a;font-size:13px;font-weight:600;margin-top:8px;display:none}

/* 复习区 */
.review-empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
.review-count{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);font-size:13px;color:#475569}
.review-count span{font-weight:700;color:#7c3aed}
</style>
</head>
<body>
<div class="app">

  <!-- 顶部状态 -->
  <div class="header">
    <div class="header-top">
      <div class="title">英语100天冲刺 🚀</div>
      <div class="streak" id="streakBadge">🔥 0天连续</div>
    </div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 100 天</div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-num" id="statNew">0</div><div class="stat-label">今日新词</div></div>
      <div class="stat-item"><div class="stat-num" id="statReview">0</div><div class="stat-label">待复习</div></div>
      <div class="stat-item"><div class="stat-num" id="statMastered">0</div><div class="stat-label">已掌握</div></div>
      <div class="stat-item"><div class="stat-num" id="statStreak">0</div><div class="stat-label">连续天</div></div>
    </div>
  </div>

  <!-- Tab导航 -->
  <div class="tabs">
    <button class="tab active" data-tab="learn">📚 今日学习</button>
    <button class="tab" data-tab="review">🔁 复习</button>
    <button class="tab" data-tab="stats">📊 统计</button>
    <button class="tab" data-tab="settings">⚙️ 设置</button>
  </div>

  <!-- 学习区 -->
  <div class="section active" id="tab-learn">
    <div class="session-info" id="sessionInfo">加载中...</div>
    <div class="card-area" id="cardArea"></div>
    <div class="btn-row" id="btnRow" style="display:none">
      <button class="btn btn-forget" id="btnForget">😕 还不会</button>
      <button class="btn btn-know" id="btnKnow">✅ 认识</button>
    </div>
    <div id="doneArea" style="display:none"></div>
  </div>

  <!-- 复习区 -->
  <div class="section" id="tab-review">
    <div id="reviewContent"></div>
  </div>

  <!-- 统计区 -->
  <div class="section" id="tab-stats">
    <div class="heatmap-wrap">
      <div class="heatmap-title">打卡热力图（最近119天）</div>
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="heatmap-wrap">
      <div class="heatmap-title">📈 总体进度</div>
      <div id="overallStats" style="font-size:14px;color:#475569;line-height:2"></div>
    </div>
  </div>

  <!-- 设置区 -->
  <div class="section" id="tab-settings">
    <div class="settings-form">
      <h3>⚙️ 学习设置</h3>
      <div class="form-row">
        <label class="form-label">目标结束日期</label>
        <input type="date" class="form-input" id="setEndDate">
        <div class="form-hint">100天冲刺截止日</div>
      </div>
      <div class="form-row">
        <label class="form-label">每天新词数量</label>
        <input type="number" class="form-input" id="setDailyNew" min="5" max="50" step="5" value="15">
        <div class="form-hint">建议10-20，能坚持比数量重要</div>
      </div>
      <div class="form-row">
        <label class="form-label">学习词库</label>
        <div class="seg" id="deckSeg">
          <button class="seg-btn active" data-deck="spoken">口语核心 721词</button>
          <button class="seg-btn" data-deck="all">全量 NGSL</button>
        </div>
        <div class="form-hint">口语核心：高频口语词，推荐先完成；全量：2859词</div>
      </div>
      <div class="form-row" id="rowSkipSpoken">
        <label class="form-label">口语核心：跳过前N个（超高频词）</label>
        <input type="number" class="form-input" id="setSkipSpoken" min="0" max="600" step="10" value="100">
        <div class="form-hint">the/be/and 这类词你肯定认识，默认跳过前100个</div>
      </div>
      <div class="form-row" id="rowSkipAll" style="display:none">
        <label class="form-label">全量NGSL：从第N词开始</label>
        <input type="number" class="form-input" id="setSkipAll" min="0" max="2500" step="100" value="1000">
        <div class="form-hint">跳过已熟悉的超高频词；你NGSL测试约1000词掌握</div>
      </div>
      <button class="btn-save" id="btnSave">💾 保存设置</button>
      <div class="save-toast" id="saveToast">✅ 设置已保存！</div>
      <button class="btn-export" id="btnExport">📤 导出 Anki 卡片</button>
      <button class="btn-reset" id="btnReset">🗑️ 清空所有进度（慎用）</button>
    </div>
  </div>

</div>

<script>
'use strict';

// ===== 数据加载 =====
var _raw = JSON.parse(document.getElementById('wordlist-data').textContent);
var _fields = _raw.meta.fields; // [order,word,def,spoken,rank,zh,ex,exzh,warn]
var WORDS = _raw.words.map(function(w){
  return {
    order: w[0], word: w[1], def: w[2], spoken: !!w[3],
    rank: w[4]||9999, zh: w[5]||'', ex: w[6]||'', exzh: w[7]||'', warn: w[8]||''
  };
});

// ===== 状态管理 =====
var STORE_KEY = 'ngsl100_v2';
function loadState(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; }
}
function saveState(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

var cfg = (function(){
  var s = loadState();
  var today = todayStr();
  // 默认值
  return {
    endDate:   s.endDate   || '2026-10-23',
    dailyNew:  s.dailyNew  || 15,
    deck:      s.deck      || 'spoken',
    skipSpoken:s.skipSpoken!==undefined ? s.skipSpoken : 100,
    skipAll:   s.skipAll   !== undefined ? s.skipAll   : 1000,
    learned:   s.learned   || {},   // word -> {srs,due,times}
    log:       s.log       || {},   // date -> {new:n,review:n}
    checkin:   s.checkin   || [],   // [date, ...]
    todayNew:  s.todayNew  || [],   // 今日已学新词列表（重置日期=today，否则清空）
    todayDate: s.todayDate || today,
  };
})();

// 日期换新则清空今日新词
if(cfg.todayDate !== todayStr()){
  cfg.todayNew = [];
  cfg.todayDate = todayStr();
  saveState(cfg);
}

function todayStr(){
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return n<10?'0'+n:n; }

// ===== 词库筛选 =====
function getDeck(){
  var list = cfg.deck==='spoken'
    ? WORDS.filter(function(w){return w.spoken;})
    : WORDS.slice();
  list.sort(function(a,b){return a.rank-b.rank;});
  var skip = cfg.deck==='spoken' ? (cfg.skipSpoken||0) : (cfg.skipAll||0);
  return list.slice(skip);
}

// ===== SRS =====
var SRS = [1,3,7,14,30,60]; // 间隔天数
function srsNext(times, knew){
  if(!knew) return {srs:0, dueDate:todayStr()};
  var lvl = Math.min(times||0, SRS.length-1);
  var days = SRS[lvl];
  var d = new Date(); d.setDate(d.getDate()+days);
  return {srs:lvl+1, dueDate:d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())};
}
function isDue(info){
  if(!info||!info.dueDate) return true;
  return info.dueDate <= todayStr();
}

// ===== 今日学习队列 =====
var sessionQueue = []; // 当前session的闪卡队列
var sessionIdx = 0;
var sessionResults = {knew:0, forgot:0};
var isReviewMode = false; // 当前session是复习还是新词

function buildLearnQueue(){
  var deck = getDeck();
  var today = todayStr();
  // 新词：没学过的，去掉今日已学
  var todayNewSet = {};
  (cfg.todayNew||[]).forEach(function(w){todayNewSet[w]=1;});
  var newWords = deck.filter(function(w){
    return !cfg.learned[w.word] && !todayNewSet[w.word];
  }).slice(0, cfg.dailyNew - (cfg.todayNew||[]).length);
  // 加上已学但今天要展示（刚学的要过一遍）
  return newWords;
}

function buildReviewQueue(){
  var deck = getDeck();
  var today = todayStr();
  return deck.filter(function(w){
    var info = cfg.learned[w.word];
    return info && isDue(info) && info.srs > 0;
  });
}

// ===== UI 渲染 =====

// 更新顶部统计
function updateHeader(){
  var deck = getDeck();
  var today = todayStr();
  var mastered = 0, dueCount = 0;
  deck.forEach(function(w){
    var info = cfg.learned[w.word];
    if(!info) return;
    if(info.srs >= SRS.length) mastered++;
    if(isDue(info) && info.srs>0) dueCount++;
  });
  var newLearned = (cfg.todayNew||[]).length;
  var log = cfg.log[today]||{};

  // 连续天
  var streak = 0;
  var d = new Date();
  while(true){
    var ds = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(cfg.checkin.indexOf(ds)>=0){ streak++; d.setDate(d.getDate()-1); }
    else break;
    if(streak>365) break;
  }

  document.getElementById('statNew').textContent = newLearned;
  document.getElementById('statReview').textContent = dueCount;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('streakBadge').textContent = '🔥 '+streak+'天连续';

  // 进度条（基于日期）
  if(cfg.endDate){
    var start = new Date(); // 粗略从今天算，真实应记录开始日
    var end = new Date(cfg.endDate);
    var total100 = 100;
    var daysPassed = cfg.checkin.length;
    var pct = Math.min(100, Math.round(daysPassed/total100*100));
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = daysPassed+' / 100 天';
  }
}

// 渲染闪卡
function renderCard(word){
  var area = document.getElementById('cardArea');
  var isSpoken = word.spoken;
  var warnHtml = word.warn ? '<div class="card-warn">⚠️ '+escHtml(word.warn)+'</div>' : '';
  var tagHtml = isSpoken ? '<div class="card-tag">口语核心</div>' : '';
  var zhHtml = word.zh ? '<div class="card-zh">'+escHtml(word.zh)+'</div>' : '';
  var exHtml = word.ex ? '<div class="card-ex">'+escHtml(word.ex)+'</div>' : '';
  var exzhHtml = word.exzh ? '<div class="card-exzh">'+escHtml(word.exzh)+'</div>' : '';

  area.innerHTML = '<div class="card" id="theCard">'
    + '<div class="card-front">'
    + tagHtml
    + '<div class="card-word">'+escHtml(word.word)+'</div>'
    + '<div class="card-hint">点击翻转 👆</div>'
    + warnHtml
    + '</div>'
    + '<div class="card-back">'
    + '<div class="card-def">'+escHtml(word.def)+'</div>'
    + zhHtml + exHtml + exzhHtml
    + '</div>'
    + '</div>';

  document.getElementById('theCard').addEventListener('click', function(){
    this.classList.toggle('flipped');
  });
}

function renderLearnSession(){
  var area = document.getElementById('cardArea');
  var btnRow = document.getElementById('btnRow');
  var doneArea = document.getElementById('doneArea');
  var info = document.getElementById('sessionInfo');

  // 构建今日新词队列（如果还没建）
  var newWords = buildLearnQueue();
  var todayNew = cfg.todayNew||[];

  if(newWords.length===0 && todayNew.length >= cfg.dailyNew){
    // 今日新词已学完
    doneArea.style.display='block';
    area.style.display='none';
    btnRow.style.display='none';
    info.style.display='none';
    var reviewQueue = buildReviewQueue();
    doneArea.innerHTML = '<div class="done-card">'
      +'<div class="done-emoji">🎉</div>'
      +'<div class="done-title">今日新词已完成！</div>'
      +'<div class="done-sub">今天学了 '+todayNew.length+' 个新词'+(reviewQueue.length>0?' · 还有 '+reviewQueue.length+' 词待复习':'')+'</div>'
      +'<div class="done-stats">'
      +'<div class="done-stat"><div class="done-stat-num">'+todayNew.length+'</div><div class="done-stat-label">新词</div></div>'
      +'</div>'
      +(reviewQueue.length>0?'<button class="btn-save" style="margin-top:16px" onclick="switchTab(\'review\')">去复习 →</button>':'')
      +'</div>';
    doCheckin();
    return;
  }

  if(newWords.length===0){
    // 词库学完了
    doneArea.style.display='block';
    area.style.display='none';
    btnRow.style.display='none';
    info.style.display='none';
    doneArea.innerHTML = '<div class="done-card">'
      +'<div class="done-emoji">🏆</div>'
      +'<div class="done-title">词库已学完！</div>'
      +'<div class="done-sub">太厉害了！可以去设置切换词库或降低skipTop</div>'
      +'</div>';
    return;
  }

  // 有新词，展示当前词
  var word = newWords[0];
  doneArea.style.display='none';
  area.style.display='block';
  btnRow.style.display='flex';
  info.style.display='block';
  var remaining = Math.max(0, cfg.dailyNew - todayNew.length);
  info.textContent = '今日新词：已学 '+todayNew.length+' / 目标 '+cfg.dailyNew+' · 还剩 '+newWords.length+' 词';
  renderCard(word);
  area.style.display='block';

  // 按钮绑定（先移除旧的）
  var btnKnow = document.getElementById('btnKnow');
  var btnForget = document.getElementById('btnForget');
  var newBtnKnow = btnKnow.cloneNode(true);
  var newBtnForget = btnForget.cloneNode(true);
  btnKnow.parentNode.replaceChild(newBtnKnow, btnKnow);
  btnForget.parentNode.replaceChild(newBtnForget, btnForget);

  newBtnKnow.addEventListener('click', function(){
    var nxt = srsNext(0, true);
    cfg.learned[word.word] = {srs:nxt.srs, dueDate:nxt.dueDate, times:1};
    cfg.todayNew = (cfg.todayNew||[]).concat([word.word]);
    saveState(cfg);
    renderLearnSession();
    updateHeader();
  });
  newBtnForget.addEventListener('click', function(){
    cfg.learned[word.word] = {srs:0, dueDate:todayStr(), times:0};
    cfg.todayNew = (cfg.todayNew||[]).concat([word.word]);
    saveState(cfg);
    renderLearnSession();
    updateHeader();
  });
}

function renderReviewSection(){
  var content = document.getElementById('reviewContent');
  var queue = buildReviewQueue();
  if(queue.length===0){
    content.innerHTML = '<div class="review-empty">🎉 暂无待复习单词<br>今日复习全部完成！</div>';
    return;
  }
  // 简单顺序复习
  var idx = 0;
  function showReview(){
    if(idx >= queue.length){
      content.innerHTML = '<div class="done-card"><div class="done-emoji">✅</div><div class="done-title">复习完成！</div><div class="done-sub">本次复习了 '+queue.length+' 个词</div></div>';
      return;
    }
    var word = queue[idx];
    var info = cfg.learned[word.word]||{};
    content.innerHTML = '<div class="review-count">复习队列：<span>'+(idx+1)+' / '+queue.length+'</span> · SRS等级 '+( info.srs||0)+'</div>';
    var cardArea = document.createElement('div');
    cardArea.className = 'card-area';
    content.appendChild(cardArea);
    cardArea.innerHTML = '<div class="card" id="revCard">'
      +'<div class="card-front"><div class="card-word">'+escHtml(word.word)+'</div><div class="card-hint">点击翻转</div></div>'
      +'<div class="card-back"><div class="card-def">'+escHtml(word.def)+'</div>'
      +(word.zh?'<div class="card-zh">'+escHtml(word.zh)+'</div>':'')
      +(word.ex?'<div class="card-ex">'+escHtml(word.ex)+'</div>':'')
      +'</div></div>';
    document.getElementById('revCard').addEventListener('click',function(){this.classList.toggle('flipped');});
    var brow = document.createElement('div');
    brow.className='btn-row';
    brow.innerHTML='<button class="btn btn-forget">😕 还不熟</button><button class="btn btn-know">✅ 记住了</button>';
    content.appendChild(brow);
    brow.querySelector('.btn-forget').addEventListener('click',function(){
      var nxt = srsNext(info.times||0, false);
      cfg.learned[word.word]={srs:nxt.srs,dueDate:nxt.dueDate,times:info.times||0};
      saveState(cfg); idx++; content.innerHTML=''; showReview(); updateHeader();
    });
    brow.querySelector('.btn-know').addEventListener('click',function(){
      var nxt = srsNext(info.times||0, true);
      cfg.learned[word.word]={srs:nxt.srs,dueDate:nxt.dueDate,times:(info.times||0)+1};
      saveState(cfg); idx++; content.innerHTML=''; showReview(); updateHeader();
    });
  }
  showReview();
}

function renderStats(){
  // 热力图
  var hm = document.getElementById('heatmap');
  hm.innerHTML='';
  var today = new Date();
  for(var i=118;i>=0;i--){
    var d = new Date(today); d.setDate(d.getDate()-i);
    var ds = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    var log = cfg.log[ds]||{};
    var n = (log.new||0)+(log.review||0);
    var lvl = n===0?0:n<5?1:n<15?2:n<30?3:4;
    var cell = document.createElement('div');
    cell.className='heatmap-cell'+(lvl?' l'+lvl:'')+(i===0?' today':'');
    cell.title=ds+': '+(n||0)+'词';
    hm.appendChild(cell);
  }

  // 总体统计
  var deck = getDeck();
  var total = deck.length;
  var learnt = deck.filter(function(w){return !!cfg.learned[w.word];}).length;
  var mastered = deck.filter(function(w){
    var info=cfg.learned[w.word]; return info&&info.srs>=SRS.length;
  }).length;
  document.getElementById('overallStats').innerHTML =
    '词库总词数：<strong>'+total+'</strong><br>'
    +'已接触：<strong>'+learnt+'</strong> 词（'+Math.round(learnt/total*100||0)+'%）<br>'
    +'完全掌握：<strong>'+mastered+'</strong> 词<br>'
    +'打卡天数：<strong>'+cfg.checkin.length+'</strong> 天<br>'
    +'目标日期：<strong>'+(cfg.endDate||'未设置')+'</strong>';
}

function renderSettings(){
  document.getElementById('setEndDate').value = cfg.endDate||'';
  document.getElementById('setDailyNew').value = cfg.dailyNew||15;
  document.getElementById('setSkipSpoken').value = cfg.skipSpoken!==undefined?cfg.skipSpoken:100;
  document.getElementById('setSkipAll').value = cfg.skipAll!==undefined?cfg.skipAll:1000;
  // 词库按钮
  document.querySelectorAll('.seg-btn[data-deck]').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.deck === cfg.deck);
  });
  // 显隐对应skip行
  document.getElementById('rowSkipSpoken').style.display = cfg.deck==='spoken'?'':'none';
  document.getElementById('rowSkipAll').style.display = cfg.deck==='all'?'':'none';
}

function doCheckin(){
  var today = todayStr();
  if(cfg.checkin.indexOf(today)<0){
    cfg.checkin.push(today);
    saveState(cfg);
  }
}

// ===== Tab切换 =====
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.tab===tab);
  });
  document.querySelectorAll('.section').forEach(function(s){
    s.classList.toggle('active', s.id==='tab-'+tab);
  });
  if(tab==='learn') renderLearnSession();
  if(tab==='review'){ document.getElementById('reviewContent').innerHTML=''; renderReviewSection(); }
  if(tab==='stats') renderStats();
  if(tab==='settings') renderSettings();
}

// ===== 导出Anki =====
function exportAnki(){
  var deck = getDeck();
  var lines = deck.map(function(w){
    return [w.word, w.def, w.zh, w.ex, w.exzh].map(function(v){
      return '"'+(v||'').replace(/"/g,'""')+'"';
    }).join('\t');
  });
  var content = '#separator:tab\n#html:false\n#columns:word\tdef\tzh\tex\texzh\n'+lines.join('\n');
  var blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'NGSL_Anki_export.txt';
  a.click();
}

// ===== 初始化 =====
function init(){
  // Tab点击
  document.querySelectorAll('.tab[data-tab]').forEach(function(tab){
    tab.addEventListener('click', function(){ switchTab(this.dataset.tab); });
  });

  // 词库切换
  document.querySelectorAll('.seg-btn[data-deck]').forEach(function(btn){
    btn.addEventListener('click', function(){
      cfg.deck = this.dataset.deck;
      document.querySelectorAll('.seg-btn[data-deck]').forEach(function(b){
        b.classList.toggle('active', b.dataset.deck===cfg.deck);
      });
      document.getElementById('rowSkipSpoken').style.display = cfg.deck==='spoken'?'':'none';
      document.getElementById('rowSkipAll').style.display = cfg.deck==='all'?'':'none';
    });
  });

  // 保存设置
  document.getElementById('btnSave').addEventListener('click', function(){
    cfg.endDate = document.getElementById('setEndDate').value;
    cfg.dailyNew = Math.max(1, parseInt(document.getElementById('setDailyNew').value)||15);
    cfg.skipSpoken = Math.max(0, parseInt(document.getElementById('setSkipSpoken').value)||0);
    cfg.skipAll = Math.max(0, parseInt(document.getElementById('setSkipAll').value)||0);
    cfg.todayNew = []; // 设置变了，今日重来
    cfg.todayDate = todayStr();
    saveState(cfg);
    var toast = document.getElementById('saveToast');
    toast.style.display='block';
    setTimeout(function(){toast.style.display='none';},2000);
    updateHeader();
    renderSettings();
  });

  // 导出
  document.getElementById('btnExport').addEventListener('click', exportAnki);

  // 清空进度
  document.getElementById('btnReset').addEventListener('click', function(){
    if(confirm('确定清空所有学习进度？此操作不可恢复！')){
      localStorage.removeItem(STORE_KEY);
      location.reload();
    }
  });

  // 初次渲染
  updateHeader();
  renderLearnSession();
  renderSettings();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 等DOM ready
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
